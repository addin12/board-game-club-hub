name: Keep Supabase awake

# Free Supabase projects pause after ~7 days of no database activity. This pings
# the REST endpoint every few days so the sessions/RSVP backend stays live.
# Enable it by adding repository secrets SUPABASE_URL and SUPABASE_ANON_KEY.

on:
  schedule:
    - cron: '0 7 */3 * *' # every 3 days at 07:00 UTC
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Supabase REST
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [[ -z "$SUPABASE_URL" || -z "$SUPABASE_ANON_KEY" ]]; then
            echo "Supabase secrets not set — skipping keep-alive."
            exit 0
          fi
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/sessions?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")
          echo "Supabase responded with HTTP $code"
          # 200 (rows) or 206 (partial) both mean the project is awake
          if [[ "$code" != "200" && "$code" != "206" ]]; then
            echo "Unexpected status — failing so the issue is visible."
            exit 1
          fi
